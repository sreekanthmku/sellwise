      context: .
      dockerfile: server/Dockerfile
    platform: linux/amd64
    # Override tag: SERVER_IMAGE_TAG=$(date +%Y%m%d-%H%M%S) docker compose build server && docker compose push server
    image: sellwisecontainerregistry-c7a9hndedyhkdpg7.azurecr.io/sellwise-server:${SERVER_IMAGE_TAG:-suzuki-india}
    env_file:
      - ./server/.env
    ports:
      - "3001:3001"
